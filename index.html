<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartshore HCM — Employee Utilization Platform</title>
  <link rel="stylesheet" href="css/app.css?v=2">
  <!-- Supabase JS v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    #app-loading {
      position: fixed; inset: 0; z-index: 9999;
      background: white;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    #app-loading .spin {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: ld-spin .7s linear infinite;
    }
    #app-loading p { font-family: Inter, sans-serif; font-size: 13px; color: #64748b; }
    @keyframes ld-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ========== AUTH LOADING SCREEN ========== -->
<div id="app-loading">
  <div class="spin"></div>
  <p>Loading Smartshore HCM…</p>
</div>

<!-- ========== SIDEBAR ========== -->
<aside id="sidebar">
  <div class="logo-area">
    <div class="logo-badge">SH</div>
    <div>
      <div class="logo-text">Smartshore HCM</div>
      <div class="logo-sub" id="sidebar-team-count">Team</div>
    </div>
  </div>

  <nav>
    <div class="nav-section-label">Main Menu</div>
    <div class="nav-item active" data-page="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </div>
    <div class="nav-item" data-page="utilization">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Utilization
      <span class="nav-badge">Live</span>
    </div>
    <div class="nav-item" data-page="employees">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      Employees
    </div>
    <div class="nav-item" data-page="projects">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h20M6 20V10M12 20V4M18 20v-6"/></svg>
      Projects
    </div>

    <div class="nav-section-label" style="margin-top:8px">Analytics</div>
    <div class="nav-item" data-page="skills">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Skills Matrix
    </div>
    <div class="nav-item" data-page="forecast">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Forecast
    </div>

    <div class="nav-section-label" style="margin-top:8px">Work</div>
    <div class="nav-item" data-page="board">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="8" rx="1"/></svg>
      Project Board
    </div>

    <div class="nav-section-label" style="margin-top:8px">Account</div>
    <div class="nav-item" onclick="handleSignOut()" style="cursor:pointer;color:#ef4444" onmouseover="this.style.background='rgba(239,68,68,.08)'" onmouseout="this.style.background=''">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-card" id="sidebar-user-card">
      <div class="ava" id="sidebar-avatar" style="background:#7c3aed">SB</div>
      <div class="info" style="flex:1;min-width:0">
        <div class="name" id="sidebar-user-name">Loading…</div>
        <div class="role" id="sidebar-user-email" style="font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
      </div>
      <button onclick="handleSignOut()" title="Sign out"
        style="background:none;border:none;cursor:pointer;color:#64748b;padding:4px;border-radius:6px;display:flex;align-items:center;flex-shrink:0;transition:color .15s"
        onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#64748b'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>
</aside>

<!-- ========== MAIN SHELL ========== -->
<div id="app-shell">

  <!-- TOP BAR -->
  <header id="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-subtitle" id="topbar-sub"></div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-secondary btn-sm" onclick="openImportModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Import
      </button>
      <button class="btn btn-secondary btn-sm" onclick="openExportModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
      <div id="topbar-avatar" style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;cursor:pointer" title="Signed in user">SB</div>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <main id="main-content">
    <!-- Rendered by app.js -->
  </main>

</div>

<!-- ========== MODAL OVERLAY ========== -->
<div id="modal-overlay" class="modal-overlay" style="display:none"></div>

<!-- ========== CELL POPOVER ========== -->
<div id="popover-backdrop" onclick="closeCellPopover()" style="display:none;position:fixed;top:0;right:0;bottom:0;left:0;z-index:8000;background:transparent"></div>
<div id="cell-popover" style="display:none;position:fixed;z-index:8001;width:420px"></div>

<!-- ========== TOAST ========== -->
<div id="toast" class="toast"></div>

<!-- ========== SCRIPTS ========== -->
<script src="js/data.js"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>

<script>
  // Auth guard — runs after supabase.js has created `sb`
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.replace('login.html');
      return;
    }

    // Populate user info in sidebar + topbar
    const user    = session.user;
    const email   = user.email || '';
    const meta    = user.user_metadata || {};
    const name    = meta.full_name || meta.name || email.split('@')[0] || 'User';
    const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

    const sidebarName   = document.getElementById('sidebar-user-name');
    const sidebarEmail  = document.getElementById('sidebar-user-email');
    const sidebarAvatar = document.getElementById('sidebar-avatar');
    const topbarAvatar  = document.getElementById('topbar-avatar');

    if (sidebarName)   sidebarName.textContent  = name;
    if (sidebarEmail)  sidebarEmail.textContent  = email;
    if (sidebarAvatar) sidebarAvatar.textContent = initials;
    if (topbarAvatar)  { topbarAvatar.textContent = initials; topbarAvatar.title = name; }

    // Hide loading screen and show app
    document.getElementById('app-loading').style.display = 'none';
  })();

  async function handleSignOut() {
    try { await sb.auth.signOut(); } catch (_) {}
    window.location.replace('login.html');
  }

  // Keep session in sync — sign out on another tab triggers redirect here too
  sb.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_OUT') window.location.replace('login.html');
  });
</script>
</body>
</html>
